name: Generate Contribution Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: bhavyasreepyla
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#6C63FF&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
